name: Start EKS Cluster Session

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  start-cluster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gha-deploy-role
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Install eksctl
        run: |
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Check if cluster already exists
        id: cluster-check
        run: |
          STATUS=$(aws eks describe-cluster \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }} \
            --query "cluster.status" \
            --output text 2>/dev/null || echo "NOT_FOUND")
          echo "cluster_status=$STATUS" >> $GITHUB_OUTPUT

      - name: Create EKS cluster
        if: steps.cluster-check.outputs.cluster_status == 'NOT_FOUND'
        run: |
          echo "🚀 Creating EKS Fargate cluster (takes ~15-20 minutes)..."
          eksctl create cluster -f eksctl/cluster-config.yaml
          echo "✅ Cluster created!"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }}

      # The OIDC provider ID is unique per cluster creation. The IAM role trust
      # policy must be updated each time the cluster is (re)created so that IRSA
      # works for the AWS Load Balancer Controller.
      - name: Update LBC IAM role trust policy with current OIDC provider
        run: |
          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          REGION=${{ secrets.AWS_REGION }}

          OIDC_ID=$(aws eks describe-cluster \
            --name cal-diary-cluster \
            --region $REGION \
            --query 'cluster.identity.oidc.issuer' \
            --output text | sed 's|https://||' | cut -d'/' -f3)

          echo "OIDC ID: $OIDC_ID"

          cat > /tmp/lbc-trust-policy.json << EOF
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::${ACCOUNT_ID}:oidc-provider/oidc.eks.${REGION}.amazonaws.com/id/${OIDC_ID}"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "oidc.eks.${REGION}.amazonaws.com/id/${OIDC_ID}:sub": "system:serviceaccount:kube-system:aws-load-balancer-controller",
                    "oidc.eks.${REGION}.amazonaws.com/id/${OIDC_ID}:aud": "sts.amazonaws.com"
                  }
                }
              }
            ]
          }
          EOF

          aws iam update-assume-role-policy \
            --role-name aws-load-balancer-controller-role \
            --policy-document file:///tmp/lbc-trust-policy.json

          echo "✅ Trust policy updated for OIDC ID: $OIDC_ID"

      - name: Create AWS Load Balancer Controller service account in kube-system
        run: |
          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}

          kubectl create serviceaccount aws-load-balancer-controller \
            -n kube-system --dry-run=client -o yaml | \
          kubectl annotate -f - \
            eks.amazonaws.com/role-arn=arn:aws:iam::${ACCOUNT_ID}:role/aws-load-balancer-controller-role \
            --local -o yaml | \
          kubectl apply -f -

          echo "✅ Service account created with IRSA annotation"

      - name: Install AWS Load Balancer Controller via Helm
        run: |
          REGION=${{ secrets.AWS_REGION }}

          # Get VPC ID dynamically from the cluster's VPC
          VPC_ID=$(aws eks describe-cluster \
            --name cal-diary-cluster \
            --region $REGION \
            --query 'cluster.resourcesVpcConfig.vpcId' \
            --output text)

          echo "VPC ID: $VPC_ID"

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=cal-diary-cluster \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set vpcId=$VPC_ID \
            --set region=$REGION

          echo "✅ AWS Load Balancer Controller installed"

      - name: Wait for CoreDNS and Load Balancer Controller
        run: |
          echo "Waiting for CoreDNS to be ready..."
          kubectl rollout status deployment/coredns -n kube-system --timeout=300s || true

          echo "Waiting for AWS Load Balancer Controller to be ready..."
          kubectl rollout status deployment/aws-load-balancer-controller -n kube-system --timeout=300s || true

      - name: Deploy app
        run: |
          echo "Deploying app and ADOT..."
          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          IMAGE_TAG="latest"

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/adot-config.yaml

          sed "s/IMAGE_TAG/$IMAGE_TAG/g; s/ACCOUNT_ID/$ACCOUNT_ID/g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml

      - name: Wait for LoadBalancer
        run: |
          echo "Waiting for LoadBalancer DNS (~2 minutes)..."
          for i in {1..24}; do
            NLB_DNS=$(kubectl get svc cal-diary -n cal-diary \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$NLB_DNS" ]; then
              echo "✅ Session ready! App URL: http://$NLB_DNS"
              exit 0
            fi
            echo "Waiting... ($i/24)"
            sleep 5
          done
          echo "⚠️  LoadBalancer DNS not yet available. Check back in a minute."

      - name: Print cost reminder
        run: |
          echo "⚠️  COST REMINDER"
          echo "Your cluster is now running and costs ~\$0.158/hr"
          echo "Budget: ~\$20/month = ~126 hours/month"
          echo "Remember to run 'Stop EKS Cluster Session' workflow when done!"
