name: Stop EKS Cluster Session

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DELETE to confirm cluster deletion"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  stop-cluster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "❌ Confirmation failed. You must type 'DELETE' to proceed."
            exit 1
          fi
          echo "✅ Confirmed. Proceeding with cluster deletion..."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gha-deploy-role
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Confirm cluster exists before deletion
        id: cluster-check
        run: |
          STATUS=$(aws eks describe-cluster \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }} \
            --query "cluster.status" \
            --output text 2>/dev/null || echo "NOT_FOUND")
          echo "cluster_status=$STATUS" >> $GITHUB_OUTPUT
          echo "Current cluster status: $STATUS"

      # Pre-delete the NLB before eksctl runs — if the NLB still exists when
      # CloudFormation tries to remove the public subnets it will fail with
      # "subnet has dependencies". Removing the NLB first releases its ENIs.
      - name: Delete NLB if still present (prevents subnet dependency failure)
        run: |
          REGION=${{ secrets.AWS_REGION }}
          NLB_ARN=$(aws elbv2 describe-load-balancers \
            --region "$REGION" \
            --query "LoadBalancers[?contains(LoadBalancerName,'caldiary') || contains(LoadBalancerName,'k8s-cal')].LoadBalancerArn" \
            --output text 2>/dev/null || true)

          if [ -n "$NLB_ARN" ] && [ "$NLB_ARN" != "None" ]; then
            echo "Found NLB: $NLB_ARN — deleting..."
            aws elbv2 delete-load-balancer --load-balancer-arn "$NLB_ARN" --region "$REGION"

            echo "Waiting up to 3 minutes for ENIs to be released..."
            for i in $(seq 1 18); do
              ENI_COUNT=$(aws ec2 describe-network-interfaces \
                --region "$REGION" \
                --filters "Name=description,Values=ELB net/k8s-caldiary*" \
                --query 'length(NetworkInterfaces)' \
                --output text 2>/dev/null || echo "0")
              if [ "$ENI_COUNT" = "0" ]; then
                echo "✅ NLB ENIs released."
                break
              fi
              echo "ENIs still present ($i/18), waiting 10s..."
              sleep 10
            done
          else
            echo "No cal-diary NLB found, skipping."
          fi

      - name: Install eksctl
        run: |
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      # Step 5: Delete the cluster. eksctl handles Fargate profiles,
      # CloudFormation stacks, VPC, and NAT gateway.
      - name: Delete EKS cluster
        if: steps.cluster-check.outputs.cluster_status != 'NOT_FOUND'
        continue-on-error: true
        run: |
          echo "🗑️  Deleting EKS cluster (takes ~10-20 minutes)..."
          eksctl delete cluster \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }} \
            --force \
            --timeout 45m \
            --wait 2>&1 | tee eksctl.log
          echo "✅ Cluster deletion command completed."

      - name: Diagnose stack deletion failure
        if: always()
        continue-on-error: true
        run: |
          REGION=${{ secrets.AWS_REGION }}
          STACK_NAME=eksctl-cal-diary-cluster-cluster

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          echo "Stack status: $STACK_STATUS"
          if [ "$STACK_STATUS" = "DELETE_FAILED" ]; then
            echo "Getting stack resources that failed to delete..."
            aws cloudformation describe-stack-resources \
              --stack-name "$STACK_NAME" \
              --region "$REGION" \
              --query "StackResources[?ResourceStatus=='DELETE_FAILED'].[LogicalResourceId,PhysicalResourceId,ResourceType]" \
              --output table 2>/dev/null || true
          fi

      - name: Delete orphaned eksctl CloudFormation stack if present
        if: always()
        continue-on-error: true
        run: |
          REGION=${{ secrets.AWS_REGION }}
          STACK_NAME=eksctl-cal-diary-cluster-cluster

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$REGION" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          echo "Stack status before cleanup: $STACK_STATUS"
          if [ "$STACK_STATUS" != "NOT_FOUND" ]; then
            echo "Deleting leftover stack $STACK_NAME (status: $STACK_STATUS)..."

            # If stack is in DELETE_FAILED state, retry deletion
            if [ "$STACK_STATUS" = "DELETE_FAILED" ]; then
              echo "Stack in DELETE_FAILED state — retrying deletion..."
            fi

            aws cloudformation delete-stack \
              --stack-name "$STACK_NAME" \
              --region "$REGION"

            echo "Waiting up to 20 minutes for stack deletion..."
            if aws cloudformation wait stack-delete-complete \
              --stack-name "$STACK_NAME" \
              --region "$REGION"; then
              echo "✅ Stack deleted successfully."
            else
              echo "⚠️ Stack deletion incomplete or timed out. May need manual cleanup."
            fi
          else
            echo "No leftover eksctl cluster stack found."
          fi

      # Step 6: Verify cluster deletion status
      - name: Verify cluster deletion
        run: |
          echo "Checking cluster deletion status..."
          CLUSTER_STATUS=$(aws eks describe-cluster \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }} \
            --query 'cluster.status' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$CLUSTER_STATUS" = "NOT_FOUND" ]; then
            echo "✅ Cluster successfully deleted"
          elif [ "$CLUSTER_STATUS" = "DELETING" ]; then
            echo "⚠️  Cluster is still DELETING — this is normal and can take several minutes"
          else
            echo "⚠️  Cluster status: $CLUSTER_STATUS"
          fi

      # Step 7: Verify no NLBs or target groups are lingering.
      - name: Verify no lingering load balancers
        run: |
          REGION=${{ secrets.AWS_REGION }}
          echo "Checking for lingering NLBs..."
          aws elbv2 describe-load-balancers \
            --region $REGION \
            --query "LoadBalancers[?contains(LoadBalancerName, 'caldiary') || contains(LoadBalancerName, 'cal-diary')].[LoadBalancerName,State.Code]" \
            --output table 2>/dev/null || true

          echo "Checking for lingering target groups..."
          aws elbv2 describe-target-groups \
            --region $REGION \
            --query "TargetGroups[?contains(TargetGroupName, 'caldiary')].[TargetGroupName,TargetType]" \
            --output table 2>/dev/null || true

      - name: Cleanup complete
        run: |
          REGION=${{ secrets.AWS_REGION }}
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name eksctl-cal-diary-cluster-cluster \
            --region "$REGION" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$STACK_STATUS" = "NOT_FOUND" ]; then
            echo "✅ Session stopped. All resources cleaned up."
            echo "No more hourly charges!"
            echo "Retained (no charges): ECR images, IAM roles, S3 state."
          elif [ "$STACK_STATUS" = "DELETE_FAILED" ]; then
            echo "⚠️ Stack in DELETE_FAILED state — retrying deletion may be needed"
            echo "Run the workflow again or manually delete the stack in CloudFormation console"
            exit 1
          else
            echo "⚠️ Stack still exists with status: $STACK_STATUS"
            echo "This may still be deleting — check CloudFormation console if issue persists"
            exit 1
          fi
