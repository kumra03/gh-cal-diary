name: Stop EKS Cluster Session

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm cluster deletion'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  stop-cluster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "❌ Confirmation failed. You must type 'DELETE' to proceed."
            exit 1
          fi
          echo "✅ Confirmed. Proceeding with cluster deletion..."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gha-deploy-role
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Update kubeconfig
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }}

      # Step 1: Delete the LoadBalancer service first so the AWS LBC can
      # cleanly remove the NLB and its target groups before we delete the
      # controller itself. Order matters — LBC must still be running here.
      - name: Delete LoadBalancer service (triggers NLB deletion)
        continue-on-error: true
        run: |
          echo "Deleting LoadBalancer service to trigger NLB cleanup..."
          kubectl delete svc cal-diary -n cal-diary --ignore-not-found=true
          echo "Service deleted. Waiting for NLB to be removed from AWS..."

      # Step 2: Poll until the NLB is actually gone in AWS — don't race ahead.
      - name: Wait for NLB to be fully deleted
        run: |
          REGION=${{ secrets.AWS_REGION }}
          echo "Polling for NLB deletion (up to 5 minutes)..."
          for i in $(seq 1 30); do
            COUNT=$(aws elbv2 describe-load-balancers \
              --region $REGION \
              --query "length(LoadBalancers[?contains(LoadBalancerName, 'k8s-caldiary')])" \
              --output text 2>/dev/null || echo "0")
            if [ "$COUNT" = "0" ]; then
              echo "✅ NLB deleted."
              break
            fi
            echo "NLB still exists ($i/30), waiting 10 seconds..."
            sleep 10
          done

      # Step 3: Uninstall the AWS Load Balancer Controller via Helm so its
      # CRDs, webhooks, and RBAC are cleanly removed.
      - name: Uninstall AWS Load Balancer Controller
        continue-on-error: true
        run: |
          echo "Uninstalling AWS Load Balancer Controller..."
          helm uninstall aws-load-balancer-controller -n kube-system || true
          echo "✅ LBC uninstalled."

      # Step 4: Delete remaining app resources.
      - name: Delete remaining Kubernetes resources
        continue-on-error: true
        run: |
          echo "Deleting remaining Kubernetes resources..."
          kubectl delete -f k8s/ --ignore-not-found=true || true

      - name: Install eksctl
        run: |
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      # Step 5: Delete the cluster. eksctl handles Fargate profiles,
      # CloudFormation stacks, VPC, and NAT gateway.
      - name: Delete EKS cluster
        continue-on-error: true
        run: |
          echo "🗑️  Deleting EKS cluster (takes ~10 minutes)..."
          eksctl delete cluster \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }} \
            --wait
          echo "✅ Cluster deletion initiated!"

      # Step 6: Verify cluster deletion status
      - name: Verify cluster deletion
        run: |
          echo "Checking cluster deletion status..."
          CLUSTER_STATUS=$(aws eks describe-cluster \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }} \
            --query 'cluster.status' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$CLUSTER_STATUS" = "NOT_FOUND" ]; then
            echo "✅ Cluster successfully deleted"
          elif [ "$CLUSTER_STATUS" = "DELETING" ]; then
            echo "⚠️  Cluster is still DELETING — this is normal and can take several minutes"
          else
            echo "⚠️  Cluster status: $CLUSTER_STATUS"
          fi

      # Step 7: Verify no NLBs or target groups are lingering.
      - name: Verify no lingering load balancers
        run: |
          REGION=${{ secrets.AWS_REGION }}
          echo "Checking for lingering NLBs..."
          aws elbv2 describe-load-balancers \
            --region $REGION \
            --query "LoadBalancers[?contains(LoadBalancerName, 'caldiary') || contains(LoadBalancerName, 'cal-diary')].[LoadBalancerName,State.Code]" \
            --output table 2>/dev/null || true

          echo "Checking for lingering target groups..."
          aws elbv2 describe-target-groups \
            --region $REGION \
            --query "TargetGroups[?contains(TargetGroupName, 'caldiary')].[TargetGroupName,TargetType]" \
            --output table 2>/dev/null || true

      - name: Cleanup complete
        run: |
          echo "✅ Session stopped. All resources cleaned up."
          echo "No more hourly charges!"
          echo "Retained (no charges): ECR images, IAM roles, S3 state."
