name: Stop EKS Cluster Session

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm cluster deletion'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  stop-cluster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "❌ Confirmation failed. You must type 'DELETE' to proceed."
            exit 1
          fi
          echo "✅ Confirmed. Proceeding with cluster deletion..."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gha-deploy-role
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Update kubeconfig
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }}

      - name: Delete Kubernetes resources
        continue-on-error: true
        run: |
          echo "Deleting Kubernetes resources..."
          kubectl delete -f k8s/ --ignore-not-found=true || true

      - name: Wait for ALB deletion
        run: |
          echo "Waiting 90 seconds for ALB to drain and delete..."
          sleep 90

      - name: Install eksctl
        run: |
          curl --silent --location "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_$(uname -s)_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Delete EKS cluster
        run: |
          echo "🗑️  Deleting EKS cluster (takes ~10 minutes)..."
          eksctl delete cluster \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }} \
            --wait
          echo "✅ Cluster deleted!"

      - name: Verify cleanup
        run: |
          echo "Verifying no lingering resources..."
          aws ec2 describe-load-balancers \
            --region ${{ secrets.AWS_REGION }} \
            --query "LoadBalancers[?contains(LoadBalancerName, 'cal-diary')].[LoadBalancerName,State.Code]" \
            --output table 2>/dev/null || true

      - name: Cleanup complete
        run: |
          echo "✅ Session stopped. All resources cleaned up."
          echo "No more hourly charges!"
          echo "ECR images retained. IAM roles retained."
