name: Deploy to EKS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gha-deploy-role
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name cal-diary-cluster \
            --region ${{ secrets.AWS_REGION }}

      - name: Apply Kubernetes manifests
        run: |
          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          IMAGE_TAG=${{ github.event.inputs.image_tag || 'latest' }}

          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml
          kubectl apply -f k8s/adot-config.yaml

          sed "s/IMAGE_TAG/$IMAGE_TAG/g; s/ACCOUNT_ID/$ACCOUNT_ID/g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml

      - name: Wait for deployment to be ready (15 min timeout)
        run: |
          kubectl rollout status deployment/cal-diary -n cal-diary --timeout=900s
        continue-on-error: true

      - name: Debug pod status if deployment failed
        if: always()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n cal-diary
          echo ""
          echo "=== Pod Events ==="
          kubectl describe pod -n cal-diary
          echo ""
          echo "=== Pod Logs (cal-diary container) ==="
          kubectl logs -n cal-diary -l app=cal-diary -c cal-diary --tail=50 || echo "No logs yet"
          echo ""
          echo "=== Pod Logs (ADOT sidecar) ==="
          kubectl logs -n cal-diary -l app=cal-diary -c adot-collector --tail=50 || echo "No logs yet"

      - name: Get LoadBalancer DNS
        run: |
          echo "Waiting for LoadBalancer to get DNS name..."
          for i in {1..30}; do
            ALB_DNS=$(kubectl get svc cal-diary -n cal-diary \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$ALB_DNS" ]; then
              echo "✅ App is accessible at: http://$ALB_DNS"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          echo "⚠️  LoadBalancer DNS not yet available. Please check later."
