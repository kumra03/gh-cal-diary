apiVersion: apps/v1
kind: Deployment
metadata:
  name: cal-diary
  namespace: cal-diary
  labels:
    app: cal-diary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cal-diary
  template:
    metadata:
      labels:
        app: cal-diary
    spec:
      serviceAccountName: adot-collector
      containers:
        - name: cal-diary
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/cal-diary:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

        - name: adot-collector
          image: public.ecr.aws/aws-observability/aws-otel-collector:v0.40.0
          imagePullPolicy: Always
          args: ["--config=/conf/adot-collector-config.yaml"]
          ports:
            - containerPort: 4317
              protocol: TCP
            - containerPort: 4318
              protocol: TCP
            - containerPort: 8888
              protocol: TCP
          resources:
            requests:
              cpu: "125m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          volumeMounts:
            - name: adot-config
              mountPath: /conf
          env:
            - name: AWS_REGION
              value: ap-southeast-1
      volumes:
        - name: adot-config
          configMap:
            name: adot-collector-config
            items:
              - key: adot-collector-config.yaml
                path: adot-collector-config.yaml
