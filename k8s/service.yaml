apiVersion: v1
kind: Service
metadata:
  name: cal-diary
  namespace: cal-diary
  labels:
    app: cal-diary
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  loadBalancerClass: service.k8s.aws/nlb
  selector:
    app: cal-diary
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
