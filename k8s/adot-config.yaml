apiVersion: v1
kind: ConfigMap
metadata:
  name: adot-collector-config
  namespace: cal-diary
data:
  adot-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: 'cal-diary-app'
              scrape_interval: 30s
              static_configs:
                - targets: ['localhost:3000']

    processors:
      batch:
        timeout: 10s
        send_batch_size: 100
      memory_limiter:
        limit_mib: 100
        spike_limit_mib: 20
        check_interval: 5s
      resource:
        attributes:
          - key: service.name
            value: cal-diary
            action: insert
          - key: deployment.environment
            value: learning
            action: insert

    exporters:
      logging:
        loglevel: debug

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [logging]
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, resource, batch]
          exporters: [logging]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [logging]
      telemetry:
        logs:
          level: warn
        metrics:
          address: 0.0.0.0:8888
