apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: cal-diary-cluster
  region: ap-southeast-1
  version: "1.30"
  tags:
    project: cal-diary
    purpose: learning

iam:
  withOIDC: true

vpc:
  cidr: "10.0.0.0/16"
  nat:
    gateway: Single

fargateProfiles:
  - name: cal-diary-profile
    selectors:
      - namespace: cal-diary
        labels:
          app: cal-diary

  # kube-system needs its own profile so CoreDNS and the AWS Load Balancer
  # Controller can be scheduled on Fargate (no EC2 nodes in this cluster).
  - name: kube-system-profile
    selectors:
      - namespace: kube-system

addons:
  - name: coredns
    version: latest
  - name: vpc-cni
    version: latest
  - name: kube-proxy
    version: latest

# Grant cluster-admin access to both IAM users so either laptop can run
# kubectl/Helm without assuming the gha-deploy-role.
# Also grant cluster-admin to gha-deploy-role so GitHub Actions CI/CD can
# manage cluster lifecycle (create, deploy, delete) without auth failures.
accessConfig:
  authenticationMode: API_AND_CONFIG_MAP
  accessEntries:
    - principalARN: arn:aws:iam::032160549000:user/ramesh-dev
      type: STANDARD
      accessPolicies:
        - policyARN: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          accessScope:
            type: cluster
    - principalARN: arn:aws:iam::032160549000:user/kumra03-console
      type: STANDARD
      accessPolicies:
        - policyARN: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          accessScope:
            type: cluster
    - principalARN: arn:aws:iam::032160549000:role/gha-deploy-role
      type: STANDARD
      accessPolicies:
        - policyARN: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          accessScope:
            type: cluster
